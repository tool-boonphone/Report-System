services:
  - type: web
    name: report-system
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # DATABASE_URL ชี้ไปที่ boonphone-db (ใช้เป็น fallback และ auth DB)
      - key: DATABASE_URL
        fromDatabase:
          name: boonphone-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: MDM_API_KEY_BOONPHONE
        sync: false
      - key: MDM_API_KEY_FASTFONE365
        sync: false
      - key: BOONPHONE_DATABASE_URL
        sync: false
      - key: FASTFONE_DATABASE_URL
        sync: false
