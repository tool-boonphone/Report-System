services:
  postgres:
    image: postgres:18
    container_name: report-system-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: report
      POSTGRES_PASSWORD: report
      POSTGRES_DB: boonphone_db
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U report -d boonphone_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
